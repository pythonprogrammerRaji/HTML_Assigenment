<html>
<head>
    <title>MARQUEE TAG</title>
</head>
<body>
    
    <center>
        <h1>Marquee Tag</h1>
    </center>

    <marquee>This is a marquee tag</marquee>
    <marquee><a href="#">this is a marquee tag</a></marquee>
    <br><hr><br>

    <marquee bgcolor="skyblue" behavior="alternate">this is a alternate marquee tag</marquee>
    <br><br>
   <marquee bgcolor="skyblue" behavior="slide">this is a slide marquee tag</marquee>
<br><br>
<marquee bgcolor="skyblue" behavior="scroll">this is a scroll marquee tag</marquee>

<br><br>
<marquee bgcolor="teal" direction="right">this is a right  marquee tag</marquee>
<br><br>

<marquee bgcolor="teal" direction="left">this is a left  marquee tag</marquee>
<br><br>


<marquee bgcolor="teal" direction="up" height="100">this is a up  marquee tag</marquee>
<br><br>

<marquee bgcolor="teal" direction="down" height="100">this is a down  marquee tag</marquee>
<br><br>

<marquee bgcolor="skyblue" scrollamount="1">this is marquee tag</marquee>

<br><br>
</body>
</html>
